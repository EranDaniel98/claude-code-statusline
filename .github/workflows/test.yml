name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run statusline state matrix
        run: python tests/test_statusline.py

      - name: Run watcher tests
        run: python tests/test_watcher.py

      - name: Smoke-import notify
        run: python -c "from claude_watcher import notify; print('backend:', type(notify.get_backend()).__name__)"
        env:
          PYTHONPATH: .

      - name: Lint merge_settings.py
        run: python -m py_compile scripts/merge_settings.py

      - name: Smoke-test merge_settings.py
        shell: bash
        run: |
          set -e
          TMP=$(mktemp -d)
          echo '{"existing":"keep"}' > "$TMP/settings.json"
          python scripts/merge_settings.py settings.example.json --settings "$TMP/settings.json"
          python -c "import json,sys; d=json.load(open('$TMP/settings.json')); assert d['existing']=='keep'; assert 'statusLine' in d; assert 'Notification' in d['hooks']; print('merge ok')"
