name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run statusline state matrix
        run: python tests/test_statusline.py

      - name: Run watcher tests
        run: python tests/test_watcher.py

      - name: Smoke-import notify
        run: python -c "from claude_watcher import notify; print('backend:', type(notify.get_backend()).__name__)"
        env:
          PYTHONPATH: .

      - name: Lint merge_settings.py
        run: python -m py_compile scripts/merge_settings.py

      - name: Smoke-test merge_settings.py
        run: |
          python -c "
          import json, pathlib, subprocess, sys, tempfile
          tmp = pathlib.Path(tempfile.mkdtemp())
          settings = tmp / 'settings.json'
          settings.write_text('{\"existing\":\"keep\"}', encoding='utf-8')
          subprocess.run(
              [sys.executable, 'scripts/merge_settings.py',
               'settings.example.json', '--settings', str(settings)],
              check=True,
          )
          d = json.loads(settings.read_text(encoding='utf-8'))
          assert d['existing'] == 'keep', d
          assert 'statusLine' in d, d
          assert 'Notification' in d['hooks'], d
          print('merge ok')
          "
